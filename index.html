<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>作品コメント組み合わせツール</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#111827;
      --ok:#047857;
      --warn:#b45309;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
      line-height:1.6;
    }
    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:18px 14px 48px;
    }
    h1{
      margin:0 0 4px;
      font-size:22px;
      line-height:1.35;
    }
    .lead{
      margin:0 0 16px;
      color:var(--muted);
      font-size:13px;
    }
    .panel,.result-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 2px 10px rgba(0,0,0,.04);
    }
    .panel{padding:16px}
    label{
      display:block;
      font-weight:700;
      margin:0 0 6px;
      font-size:14px;
    }
    input,textarea{
      width:100%;
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:12px;
      font:inherit;
      font-size:16px;
      color:var(--text);
      background:#fff;
      outline:none;
    }
    input:focus,textarea:focus{
      border-color:#6b7280;
      box-shadow:0 0 0 3px rgba(107,114,128,.12);
    }
    textarea{
      min-height:180px;
      resize:vertical;
    }
    .field + .field{margin-top:14px}
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:16px;
    }
    button{
      appearance:none;
      border:0;
      border-radius:10px;
      padding:12px 14px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
    }
    .primary{background:var(--primary);color:#fff}
    .secondary{background:#e5e7eb;color:var(--text)}
    .rules{
      margin:14px 0 0;
      padding:12px;
      background:#f9fafb;
      border-radius:10px;
      font-size:12px;
      color:#4b5563;
    }
    .status{
      display:none;
      margin-top:12px;
      padding:10px 12px;
      border-radius:10px;
      font-size:13px;
    }
    .status.show{display:block}
    .status.warn{background:#fff7ed;color:var(--warn)}
    .status.ok{background:#ecfdf5;color:var(--ok)}
    .section-title{
      margin:24px 2px 10px;
      font-size:18px;
    }
    .results{
      display:grid;
      gap:10px;
    }
    .result-card{
      padding:14px;
    }
    .result-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }
    .result-no{
      font-weight:800;
      font-size:14px;
    }
    .count{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }
    .text{
      margin:0;
      font-size:15px;
      word-break:break-word;
    }
    .copy{
      width:100%;
      margin-top:12px;
      background:#eef2ff;
      color:#3730a3;
      padding:10px;
    }
    .copy.done{
      background:#ecfdf5;
      color:var(--ok);
    }
    .empty{
      padding:16px;
      background:#fff;
      border:1px dashed #cbd5e1;
      border-radius:12px;
      color:var(--muted);
      font-size:14px;
    }
    @media (max-width:420px){
      .actions{grid-template-columns:1fr}
      h1{font-size:20px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>作品コメント組み合わせツール</h1>
    <p class="lead">作品名と商品コメントの原文だけを使い、110文字以内の候補を作ります。</p>

    <section class="panel">
      <div class="field">
        <label for="title">作品名</label>
        <input id="title" type="text" placeholder="作品名を貼り付け">
      </div>

      <div class="field">
        <label for="comment">商品コメント</label>
        <textarea id="comment" placeholder="商品コメントを貼り付け"></textarea>
      </div>

      <div class="actions">
        <button id="generate" class="primary" type="button">生成</button>
        <button id="regenerate" class="secondary" type="button">再生成</button>
      </div>

      <div class="rules">
        原文にない文章は追加しません。「、」は削除。「。」などの区切りは「！」に統一。改行なし。原文の順番を維持。文章の途中では切らず、110文字以内に収めます。
      </div>
      <div id="status" class="status"></div>
    </section>

    <section>
      <h2 class="section-title">作品名あり（5案）</h2>
      <div id="withTitle" class="results">
        <div class="empty">作品名と商品コメントを入力して「生成」を押してください。</div>
      </div>
    </section>

    <section>
      <h2 class="section-title">商品コメントのみ（5案）</h2>
      <div id="withoutTitle" class="results">
        <div class="empty">生成結果がここに表示されます。</div>
      </div>
    </section>
  </main>

<script>
(() => {
  const LIMIT = 110;
  const titleEl = document.getElementById('title');
  const commentEl = document.getElementById('comment');
  const withTitleEl = document.getElementById('withTitle');
  const withoutTitleEl = document.getElementById('withoutTitle');
  const statusEl = document.getElementById('status');

  let generationSeed = Date.now();

  function normalizeText(text) {
    return String(text || '')
      .replace(/\r?\n/g, '')
      .replace(/[、，,]/g, '')
      .replace(/[。．.！？!?]+/g, '！')
      .replace(/！{2,}/g, '！')
      .replace(/[ \t\u3000]+/g, '')
      .trim();
  }

  function splitOriginal(text) {
    const raw = String(text || '').replace(/\r?\n/g, '');
    // 文末記号で分割。記号がない長文は原文全体を1単位として扱う。
    const matches = raw.match(/[^。．.!！?？]+[。．.!！?？]?/g) || [];
    const parts = matches
      .map(normalizeText)
      .map(s => s.replace(/！+$/g, ''))
      .filter(Boolean);
    return parts.length ? parts : [normalizeText(raw).replace(/！+$/g, '')].filter(Boolean);
  }

  function addBang(text) {
    const s = normalizeText(text).replace(/！+$/g, '');
    return s ? s + '！' : '';
  }

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }

  function shuffled(arr, seed) {
    const a = [...arr];
    const rand = mulberry32(seed);
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function combinationsInOrder(parts) {
    const combos = [];
    const n = parts.length;
    // 最大20文まで。通常の商品コメントでは十分。
    const maxN = Math.min(n, 20);

    // 連続範囲
    for (let start = 0; start < maxN; start++) {
      let current = '';
      for (let end = start; end < maxN; end++) {
        current += addBang(parts[end]);
        combos.push(current);
      }
    }

    // 原文順を維持した間引き組み合わせ
    if (maxN <= 12) {
      const total = 1 << maxN;
      for (let mask = 1; mask < total; mask++) {
        let text = '';
        for (let i = 0; i < maxN; i++) {
          if (mask & (1 << i)) text += addBang(parts[i]);
        }
        combos.push(text);
      }
    } else {
      // 文数が多い場合は代表的な間引き
      for (let step = 2; step <= 4; step++) {
        for (let offset = 0; offset < step; offset++) {
          let text = '';
          for (let i = offset; i < maxN; i += step) text += addBang(parts[i]);
          if (text) combos.push(text);
        }
      }
    }

    return [...new Set(combos.map(normalizeText).filter(Boolean))];
  }

  function pickFive(candidates, seed) {
    const unique = [...new Set(candidates)].filter(t => t.length <= LIMIT && t.length > 0);

    // 長さに幅を持たせつつ、毎回少し違う候補を選ぶ
    const sorted = unique.sort((a, b) => a.length - b.length);
    if (sorted.length <= 5) return sorted;

    const buckets = [[], [], [], [], []];
    sorted.forEach((item, idx) => {
      const bucket = Math.min(4, Math.floor(idx / sorted.length * 5));
      buckets[bucket].push(item);
    });

    const rand = mulberry32(seed);
    const chosen = buckets
      .map(bucket => bucket.length ? bucket[Math.floor(rand() * bucket.length)] : null)
      .filter(Boolean);

    const remaining = shuffled(sorted.filter(x => !chosen.includes(x)), seed + 91);
    while (chosen.length < 5 && remaining.length) chosen.push(remaining.shift());

    return chosen.sort((a, b) => a.length - b.length);
  }

  function buildResults(titleRaw, commentRaw, seed) {
    const title = normalizeText(titleRaw).replace(/！+$/g, '');
    const parts = splitOriginal(commentRaw);
    const commentCombos = combinationsInOrder(parts);

    const withoutTitle = pickFive(commentCombos, seed);

    const titlePrefix = title ? addBang(title) : '';
    const withTitleCandidates = titlePrefix
      ? commentCombos.map(c => normalizeText(titlePrefix + c))
      : [];
    const withTitle = pickFive(withTitleCandidates, seed + 777);

    return { withTitle, withoutTitle, title, parts };
  }

  function render(container, items, startNo) {
    container.innerHTML = '';
    if (!items.length) {
      container.innerHTML = '<div class="empty">110文字以内で作れる候補がありません。入力文が長すぎるか、区切りが少ない可能性があります。</div>';
      return;
    }

    items.forEach((text, i) => {
      const card = document.createElement('article');
      card.className = 'result-card';

      const head = document.createElement('div');
      head.className = 'result-head';

      const no = document.createElement('div');
      no.className = 'result-no';
      no.textContent = `${startNo + i}`;

      const count = document.createElement('div');
      count.className = 'count';
      count.textContent = `${text.length}/${LIMIT}文字`;

      const p = document.createElement('p');
      p.className = 'text';
      p.textContent = text;

      const btn = document.createElement('button');
      btn.className = 'copy';
      btn.type = 'button';
      btn.textContent = 'コピー';
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
        }
        btn.textContent = 'コピーしました';
        btn.classList.add('done');
        setTimeout(() => {
          btn.textContent = 'コピー';
          btn.classList.remove('done');
        }, 1400);
      });

      head.append(no, count);
      card.append(head, p, btn);
      container.appendChild(card);
    });
  }

  function showStatus(message, type='ok') {
    statusEl.textContent = message;
    statusEl.className = `status show ${type}`;
  }

  function generate(isRegenerate=false) {
    const title = titleEl.value.trim();
    const comment = commentEl.value.trim();

    if (!comment) {
      showStatus('商品コメントを入力してください。', 'warn');
      return;
    }
    if (!title) {
      showStatus('作品名が空欄のため「作品名あり」は生成できません。商品コメントのみは生成します。', 'warn');
    } else {
      showStatus(isRegenerate ? '別の組み合わせで再生成しました。' : '生成しました。', 'ok');
    }

    generationSeed = isRegenerate ? generationSeed + 1009 : Date.now();
    const result = buildResults(title, comment, generationSeed);
    render(withTitleEl, result.withTitle, 1);
    render(withoutTitleEl, result.withoutTitle, 6);
  }

  document.getElementById('generate').addEventListener('click', () => generate(false));
  document.getElementById('regenerate').addEventListener('click', () => generate(true));
})();
</script>
</body>
</html>
