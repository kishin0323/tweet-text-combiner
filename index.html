<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>作品コメント組み合わせツール v5</title>
  <style>
    :root{
      --bg:#f3f4f6; --card:#fff; --text:#111827; --muted:#6b7280;
      --line:#e5e7eb; --primary:#111827; --ok:#047857; --warn:#b45309;
      --fav:#f59e0b;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
      line-height:1.6}
    .wrap{max-width:760px;margin:0 auto;padding:18px 14px 48px}
    h1{margin:0 0 4px;font-size:22px;line-height:1.35}
    .lead{margin:0 0 16px;color:var(--muted);font-size:13px}
    .panel,.result-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
      box-shadow:0 2px 10px rgba(0,0,0,.04)}
    .panel{padding:16px}
    label{display:block;font-weight:700;margin:0 0 6px;font-size:14px}
    input,textarea{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:12px;
      font:inherit;font-size:16px;color:var(--text);background:#fff;outline:none}
    textarea{min-height:180px;resize:vertical}
    .field + .field{margin-top:14px}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    button{appearance:none;border:0;border-radius:10px;padding:12px 14px;font-weight:700;font-size:15px;cursor:pointer}
    .primary{background:var(--primary);color:#fff}.secondary{background:#e5e7eb;color:var(--text)}
    .rules{margin:14px 0 0;padding:12px;background:#f9fafb;border-radius:10px;font-size:12px;color:#4b5563}
    .status{display:none;margin-top:12px;padding:10px 12px;border-radius:10px;font-size:13px}
    .status.show{display:block}.status.warn{background:#fff7ed;color:var(--warn)}.status.ok{background:#ecfdf5;color:var(--ok)}
    .section-title-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:24px 2px 10px}
    .section-title{margin:0;font-size:18px}
    .filter-btn{padding:8px 10px;font-size:12px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}
    .results{display:grid;gap:10px}.result-card{padding:14px}
    .result-card.favorited{border-color:#fbbf24;box-shadow:0 0 0 2px rgba(251,191,36,.15)}
    .result-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .result-no{font-weight:800;font-size:14px}.count{font-size:12px;color:var(--muted);white-space:nowrap}
    .text{margin:0;font-size:15px;word-break:break-word}
    .result-actions{display:grid;grid-template-columns:52px 1fr;gap:8px;margin-top:12px}
    .favorite{background:#fff7ed;color:#92400e;font-size:20px;padding:8px}
    .favorite.active{background:#fef3c7;color:var(--fav)}
    .copy{background:#eef2ff;color:#3730a3;padding:10px}
    .copy.done{background:#ecfdf5;color:var(--ok)}
    .empty{padding:16px;background:#fff;border:1px dashed #cbd5e1;border-radius:12px;color:var(--muted);font-size:14px}
    @media(max-width:420px){.actions{grid-template-columns:1fr}h1{font-size:20px}}
  </style>
</head>
<body>
<main class="wrap">
  <h1>作品コメント組み合わせツール v5</h1>
  <p class="lead">長めの作品名と、反応を取りやすい強いフレーズを優先します。</p>

  <section class="panel">
    <div class="field">
      <label for="title">作品名</label>
      <input id="title" type="text" placeholder="作品名を貼り付け">
    </div>
    <div class="field">
      <label for="comment">商品コメント</label>
      <textarea id="comment" placeholder="商品コメントを貼り付け"></textarea>
    </div>
    <div class="actions">
      <button id="generate" class="primary" type="button">生成</button>
      <button id="regenerate" class="secondary" type="button">再生成</button>
    </div>
    <div class="rules">
      原文にない文章は追加しません。単語途中では切りません。作品名ありでは、110文字に収まる範囲でなるべく長い作品名を優先します。
      コメントは原文内の強い表現を優先して組み合わせます。「」は対で保持。「え、」「あ、」などは「え！」「あ！」として残します。
      本文は110文字以内。最後の「！」を外し「🩷🩷🩷」を付けます。ハートは文字数に含めません。
    </div>
    <div id="status" class="status"></div>
  </section>

  <section>
    <div class="section-title-row">
      <h2 class="section-title">作品名あり（5案）</h2>
      <button class="filter-btn" data-target="withTitle">⭐だけ表示</button>
    </div>
    <div id="withTitle" class="results"><div class="empty">作品名と商品コメントを入力して「生成」を押してください。</div></div>
  </section>

  <section>
    <div class="section-title-row">
      <h2 class="section-title">商品コメントのみ（5案）</h2>
      <button class="filter-btn" data-target="withoutTitle">⭐だけ表示</button>
    </div>
    <div id="withoutTitle" class="results"><div class="empty">生成結果がここに表示されます。</div></div>
  </section>
</main>

<script>
(() => {
  const LIMIT = 110;
  const HEARTS = '🩷🩷🩷';
  const STORAGE_KEY = 'tweet-text-combiner-v5-favorites';

  const titleEl = document.getElementById('title');
  const commentEl = document.getElementById('comment');
  const withTitleEl = document.getElementById('withTitle');
  const withoutTitleEl = document.getElementById('withoutTitle');
  const statusEl = document.getElementById('status');

  let generationSeed = Date.now();
  let latestResults = {withTitle:[], withoutTitle:[]};
  let filters = {withTitle:false, withoutTitle:false};

  const charLength = s => Array.from(String(s || '')).length;

  function loadFavorites(){
    try{return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'))}
    catch{return new Set()}
  }
  function saveFavorites(set){
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
  }

  function preprocess(text){
    let s = String(text || '').replace(/\r?\n/g, '');
    s = s.replace(/(^|[。！？!?\s「『])\s*(えっ?|あっ?|あれ|ん|ねえ|おい|まさか)、/g, '$1$2！');
    s = s.replace(/[、，,]/g, '');
    s = s.replace(/[。．.！？!?]+/g, '！');
    s = s.replace(/！{2,}/g, '！');
    s = s.replace(/[ \t\u3000]+/g, ' ').trim();
    return s;
  }

  function compact(text){ return preprocess(text).replace(/\s+/g, '').trim(); }
  function cleanEdge(text){
    return compact(text).replace(/^[！・:：;；\-—_~〜]+/, '').replace(/[！・:：;；\-—_~〜]+$/, '');
  }
  function addBang(text){ const s=cleanEdge(text); return s ? s+'！' : ''; }
  function finalize(text){ const body=compact(text).replace(/！+$/g,''); return body ? body+HEARTS : ''; }
  function bodyLength(text){ return charLength(text.endsWith(HEARTS) ? text.slice(0,-HEARTS.length) : text); }

  function mulberry32(seed){
    return function(){
      let t=seed+=0x6D2B79F5;
      t=Math.imul(t^t>>>15,t|1);
      t^=t+Math.imul(t^t>>>7,t|61);
      return ((t^t>>>14)>>>0)/4294967296;
    }
  }

  function isBalancedQuotes(s){
    return [['「','」'],['『','』'],['【','】'],['（','）'],['(',')']]
      .every(([a,b]) => (s.split(a).length-1)===(s.split(b).length-1));
  }

  function splitOutsideQuotes(raw){
    const s=preprocess(raw), units=[];
    let buf='', depth=0;
    const openers=new Set(['「','『','【','（','(']);
    const closers=new Set(['」','』','】','）',')']);
    for(const ch of s){
      if(openers.has(ch)) depth++;
      if(closers.has(ch)) depth=Math.max(0,depth-1);
      if(ch==='！' && depth===0){
        const unit=cleanEdge(buf);
        if(unit) units.push(unit);
        buf='';
      } else buf+=ch;
    }
    const tail=cleanEdge(buf);
    if(tail) units.push(tail);
    return units.filter(isBalancedQuotes);
  }

  function buildCommentUnits(raw){
    const base=splitOutsideQuotes(raw), units=[];
    for(const unit of base){
      units.push(unit);
      if(/[「『【（(]/.test(unit)) continue;
      const subs=unit.split(/[／\/｜|・:：;；〜~—_]+/).map(cleanEdge).filter(Boolean).filter(isBalancedQuotes);
      if(subs.length>1) units.push(...subs);
    }
    return [...new Set(units)];
  }

  const strongWords = [
    '絶頂','中出し','潮吹き','愛液','イキ','イク','敏感','濃厚','大量','豪華','大胆',
    '悶絶','興奮','発情','我慢','絶倫','密着','誘惑','ハメ','乱交','激しく','限界',
    'タジタジ','撮り下ろし','丸見え','開脚','吐息','腰','びしょ濡れ','ぐっしょり'
  ];

  function impactScore(text){
    let score=0;
    for(const word of strongWords){
      if(text.includes(word)) score += 18;
    }
    if(/[0-9０-９]+名/.test(text)) score += 8;
    if(/[0-9０-９]+射/.test(text)) score += 8;
    if(text.includes('！')) score += 2;
    return score;
  }

  function buildOrderedCombos(units){
    const combos=[], n=Math.min(units.length,18);

    for(let start=0; start<n; start++){
      let current='';
      for(let end=start; end<n; end++){
        const next=current+addBang(units[end]);
        if(charLength(next.replace(/！+$/g,''))<=LIMIT){
          current=next; combos.push(current);
        }else break;
      }
    }

    if(n<=14){
      const total=1<<n;
      for(let mask=1; mask<total; mask++){
        let text='', valid=true;
        for(let i=0;i<n;i++){
          if(mask&(1<<i)){
            const next=text+addBang(units[i]);
            if(charLength(next.replace(/！+$/g,''))>LIMIT){valid=false;break}
            text=next;
          }
        }
        if(valid&&text) combos.push(text);
      }
    }
    return [...new Set(combos.filter(Boolean))];
  }

  function buildTitleVariants(rawTitle){
    const raw=String(rawTitle||'').trim();
    if(!raw) return [];
    const full=cleanEdge(raw), variants=new Set([full]);

    const tokens=raw
      .replace(/([A-Za-z0-9]+)/g,' $1 ')
      .split(/[\s　「」『』【】\[\]（）()＜＞<>／\/｜|・:：;；〜~—_]+/)
      .map(cleanEdge).filter(Boolean);

    let prefix='';
    for(const token of tokens){
      prefix+=token;
      if(prefix) variants.add(prefix);
      if(charLength(token)>=4) variants.add(token);
    }

    return [...variants]
      .filter(Boolean).filter(isBalancedQuotes)
      .sort((a,b)=>charLength(b)-charLength(a)); // 長いタイトルを先に
  }

  function scoreText(text, titleLength=0, target=104){
    const len=charLength(text.replace(/！+$/g,''));
    let score=0;

    if(len>=100&&len<=110) score+=1000;
    else if(len>=90) score+=700;
    else if(len>=75) score+=400;
    else score+=len*2;

    score -= Math.abs(target-len)*4;
    score += impactScore(text);
    score += titleLength*2.3; // 収まる範囲で長いタイトルを優先
    return score;
  }

  function pickFive(candidates, seed){
    const unique=[...new Map(
      candidates
        .filter(x=>x && x.text)
        .filter(x=>isBalancedQuotes(x.text))
        .filter(x=>charLength(x.text.replace(/！+$/g,''))<=LIMIT)
        .map(x=>[x.text,x])
    ).values()];

    if(!unique.length) return [];

    const rand=mulberry32(seed);
    const ranked=unique
      .map(x=>({...x, score:scoreText(x.text,x.titleLength||0)+rand()*20}))
      .sort((a,b)=>b.score-a.score);

    return ranked.slice(0,5).map(x=>finalize(x.text));
  }

  function buildResults(titleRaw, commentRaw, seed){
    const commentUnits=buildCommentUnits(commentRaw);
    const commentCombos=buildOrderedCombos(commentUnits);

    const withoutTitle=pickFive(
      commentCombos.map(text=>({text,titleLength:0})),
      seed
    );

    const titleVariants=buildTitleVariants(titleRaw);
    const withTitleCandidates=[];

    for(const title of titleVariants){
      const prefix=addBang(title);
      if(charLength(prefix.replace(/！+$/g,''))>LIMIT) continue;

      for(const comment of commentCombos){
        const joined=compact(prefix+comment);
        if(charLength(joined.replace(/！+$/g,''))<=LIMIT && isBalancedQuotes(joined)){
          withTitleCandidates.push({text:joined,titleLength:charLength(title)});
        }
      }
    }

    return {
      withTitle:pickFive(withTitleCandidates,seed+777),
      withoutTitle
    };
  }

  function render(container, items, startNo, key){
    container.innerHTML='';
    const favorites=loadFavorites();
    const visible=filters[key] ? items.filter(t=>favorites.has(t)) : items;

    if(!visible.length){
      container.innerHTML='<div class="empty">'+(filters[key]?'お気に入りはまだありません。':'候補がありません。')+'</div>';
      return;
    }

    visible.forEach((text,i)=>{
      const card=document.createElement('article');
      card.className='result-card'+(favorites.has(text)?' favorited':'');

      const head=document.createElement('div');
      head.className='result-head';

      const no=document.createElement('div');
      no.className='result-no';
      no.textContent=String(startNo+i);

      const count=document.createElement('div');
      count.className='count';
      count.textContent=`${bodyLength(text)}/${LIMIT}文字＋🩷🩷🩷`;

      const p=document.createElement('p');
      p.className='text';
      p.textContent=text;

      const actions=document.createElement('div');
      actions.className='result-actions';

      const fav=document.createElement('button');
      fav.className='favorite'+(favorites.has(text)?' active':'');
      fav.type='button';
      fav.textContent=favorites.has(text)?'★':'☆';
      fav.addEventListener('click',()=>{
        const current=loadFavorites();
        current.has(text)?current.delete(text):current.add(text);
        saveFavorites(current);
        render(container,items,startNo,key);
      });

      const copy=document.createElement('button');
      copy.className='copy';
      copy.type='button';
      copy.textContent='コピー';
      copy.addEventListener('click',async()=>{
        try{await navigator.clipboard.writeText(text)}
        catch{
          const ta=document.createElement('textarea');
          ta.value=text; document.body.appendChild(ta); ta.select();
          document.execCommand('copy'); ta.remove();
        }
        copy.textContent='コピーしました';
        copy.classList.add('done');
        setTimeout(()=>{copy.textContent='コピー';copy.classList.remove('done')},1400);
      });

      head.append(no,count);
      actions.append(fav,copy);
      card.append(head,p,actions);
      container.appendChild(card);
    });
  }

  function showStatus(message,type='ok'){
    statusEl.textContent=message;
    statusEl.className=`status show ${type}`;
  }

  function rerender(){
    render(withTitleEl,latestResults.withTitle,1,'withTitle');
    render(withoutTitleEl,latestResults.withoutTitle,6,'withoutTitle');
  }

  function generate(isRegenerate=false){
    const title=titleEl.value.trim(), comment=commentEl.value.trim();
    if(!comment){showStatus('商品コメントを入力してください。','warn');return}

    showStatus(isRegenerate?'別の組み合わせで再生成しました。':'生成しました。','ok');
    generationSeed=isRegenerate?generationSeed+1009:Date.now();
    latestResults=buildResults(title,comment,generationSeed);
    rerender();
  }

  document.getElementById('generate').addEventListener('click',()=>generate(false));
  document.getElementById('regenerate').addEventListener('click',()=>generate(true));

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const key=btn.dataset.target;
      filters[key]=!filters[key];
      btn.textContent=filters[key]?'すべて表示':'⭐だけ表示';
      rerender();
    });
  });
})();
</script>
</body>
</html>
