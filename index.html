<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>作品コメント組み合わせツール v4</title>
  <style>
    :root{
      --bg:#f3f4f6; --card:#fff; --text:#111827; --muted:#6b7280;
      --line:#e5e7eb; --primary:#111827; --ok:#047857; --warn:#b45309;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
      line-height:1.6}
    .wrap{max-width:760px;margin:0 auto;padding:18px 14px 48px}
    h1{margin:0 0 4px;font-size:22px;line-height:1.35}
    .lead{margin:0 0 16px;color:var(--muted);font-size:13px}
    .panel,.result-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
      box-shadow:0 2px 10px rgba(0,0,0,.04)}
    .panel{padding:16px}
    label{display:block;font-weight:700;margin:0 0 6px;font-size:14px}
    input,textarea{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:12px;
      font:inherit;font-size:16px;color:var(--text);background:#fff;outline:none}
    textarea{min-height:180px;resize:vertical}
    .field + .field{margin-top:14px}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    button{appearance:none;border:0;border-radius:10px;padding:12px 14px;font-weight:700;font-size:15px;cursor:pointer}
    .primary{background:var(--primary);color:#fff}.secondary{background:#e5e7eb;color:var(--text)}
    .rules{margin:14px 0 0;padding:12px;background:#f9fafb;border-radius:10px;font-size:12px;color:#4b5563}
    .status{display:none;margin-top:12px;padding:10px 12px;border-radius:10px;font-size:13px}
    .status.show{display:block}.status.warn{background:#fff7ed;color:var(--warn)}.status.ok{background:#ecfdf5;color:var(--ok)}
    .section-title{margin:24px 2px 10px;font-size:18px}
    .results{display:grid;gap:10px}.result-card{padding:14px}
    .result-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .result-no{font-weight:800;font-size:14px}.count{font-size:12px;color:var(--muted);white-space:nowrap}
    .text{margin:0;font-size:15px;word-break:break-word}
    .copy{width:100%;margin-top:12px;background:#eef2ff;color:#3730a3;padding:10px}
    .copy.done{background:#ecfdf5;color:var(--ok)}
    .empty{padding:16px;background:#fff;border:1px dashed #cbd5e1;border-radius:12px;color:var(--muted);font-size:14px}
    @media(max-width:420px){.actions{grid-template-columns:1fr}h1{font-size:20px}}
  </style>
</head>
<body>
<main class="wrap">
  <h1>作品コメント組み合わせツール v4</h1>
  <p class="lead">タイトル候補・かぎ括弧・短い感嘆語を自然に扱うよう修正しました。</p>

  <section class="panel">
    <div class="field">
      <label for="title">作品名</label>
      <input id="title" type="text" placeholder="作品名を貼り付け">
    </div>
    <div class="field">
      <label for="comment">商品コメント</label>
      <textarea id="comment" placeholder="商品コメントを貼り付け"></textarea>
    </div>
    <div class="actions">
      <button id="generate" class="primary" type="button">生成</button>
      <button id="regenerate" class="secondary" type="button">再生成</button>
    </div>
    <div class="rules">
      原文にない文章は追加しません。単語途中では切りません。作品名は空白や記号など自然な区切りで短くします。
      「」は必ず対で保持します。「え、」「あ、」などの短い感嘆語は「え！」「あ！」として残します。
      本文は110文字以内。最後の「！」を外し「🩷🩷🩷」を付けます。ハートは文字数に含めません。
    </div>
    <div id="status" class="status"></div>
  </section>

  <section>
    <h2 class="section-title">作品名あり（5案）</h2>
    <div id="withTitle" class="results"><div class="empty">作品名と商品コメントを入力して「生成」を押してください。</div></div>
  </section>

  <section>
    <h2 class="section-title">商品コメントのみ（5案）</h2>
    <div id="withoutTitle" class="results"><div class="empty">生成結果がここに表示されます。</div></div>
  </section>
</main>

<script>
(() => {
  const LIMIT = 110;
  const HEARTS = '🩷🩷🩷';
  const titleEl = document.getElementById('title');
  const commentEl = document.getElementById('comment');
  const withTitleEl = document.getElementById('withTitle');
  const withoutTitleEl = document.getElementById('withoutTitle');
  const statusEl = document.getElementById('status');
  let generationSeed = Date.now();

  const charLength = s => Array.from(String(s || '')).length;

  function preprocess(text){
    let s = String(text || '').replace(/\r?\n/g, '');
    // 短い感嘆語の読点だけは「！」へ
    s = s.replace(/(^|[。！？!?\s「『])\s*(えっ?|あっ?|あれ|ん|ねえ|おい|まさか)、/g, '$1$2！');
    // その他の読点は削除
    s = s.replace(/[、，,]/g, '');
    s = s.replace(/[。．.！？!?]+/g, '！');
    s = s.replace(/！{2,}/g, '！');
    s = s.replace(/[ \t\u3000]+/g, ' ').trim();
    return s;
  }

  function compact(text){
    return preprocess(text).replace(/\s+/g, '').trim();
  }

  function cleanEdge(text){
    return compact(text)
      .replace(/^[！・:：;；\-—_~〜]+/, '')
      .replace(/[！・:：;；\-—_~〜]+$/, '');
  }

  function addBang(text){
    const s = cleanEdge(text);
    return s ? s + '！' : '';
  }

  function finalize(text){
    const body = compact(text).replace(/！+$/g, '');
    return body ? body + HEARTS : '';
  }

  function bodyLength(text){
    return charLength(text.endsWith(HEARTS) ? text.slice(0, -HEARTS.length) : text);
  }

  function mulberry32(seed){
    return function(){
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }

  // かぎ括弧の中では分割しない
  function splitOutsideQuotes(raw){
    const s = preprocess(raw);
    const units = [];
    let buf = '';
    let quoteDepth = 0;

    const openers = new Set(['「','『','【','（','(']);
    const closers = new Set(['」','』','】','）',')']);

    for(const ch of s){
      if(openers.has(ch)) quoteDepth++;
      if(closers.has(ch)) quoteDepth = Math.max(0, quoteDepth - 1);

      if(ch === '！' && quoteDepth === 0){
        const unit = cleanEdge(buf);
        if(unit) units.push(unit);
        buf = '';
      } else {
        buf += ch;
      }
    }
    const tail = cleanEdge(buf);
    if(tail) units.push(tail);

    return units.filter(isBalancedQuotes);
  }

  function isBalancedQuotes(s){
    const pairs = [['「','」'],['『','』'],['【','】'],['（','）'],['(',')']];
    return pairs.every(([a,b]) => (s.split(a).length - 1) === (s.split(b).length - 1));
  }

  function buildCommentUnits(raw){
    const base = splitOutsideQuotes(raw);
    const units = [];

    for(const unit of base){
      units.push(unit);

      // かぎ括弧を含む文は丸ごと保持
      if(/[「『【（(]/.test(unit)) continue;

      // 自然な記号区切りだけで追加候補化
      const subs = unit
        .split(/[／\/｜|・:：;；〜~—_]+/)
        .map(cleanEdge)
        .filter(Boolean)
        .filter(isBalancedQuotes);

      if(subs.length > 1) units.push(...subs);
    }

    return [...new Set(units)];
  }

  function buildOrderedCombos(units){
    const combos = [];
    const n = Math.min(units.length, 18);

    for(let start=0; start<n; start++){
      let current = '';
      for(let end=start; end<n; end++){
        const next = current + addBang(units[end]);
        if(charLength(next.replace(/！+$/g,'')) <= LIMIT){
          current = next;
          combos.push(current);
        } else break;
      }
    }

    if(n <= 14){
      const total = 1 << n;
      for(let mask=1; mask<total; mask++){
        let text = '';
        let valid = true;
        for(let i=0; i<n; i++){
          if(mask & (1 << i)){
            const next = text + addBang(units[i]);
            if(charLength(next.replace(/！+$/g,'')) > LIMIT){
              valid = false; break;
            }
            text = next;
          }
        }
        if(valid && text) combos.push(text);
      }
    }

    return [...new Set(combos.filter(Boolean))];
  }

  function buildTitleVariants(rawTitle){
    const raw = String(rawTitle || '').trim();
    if(!raw) return [];

    const full = cleanEdge(raw);
    const variants = new Set([full]);

    // 空白・自然な記号・ASCII語の境界を利用。文字数で途中切りしない。
    const tokens = raw
      .replace(/([A-Za-z0-9]+)/g, ' $1 ')
      .split(/[\s　「」『』【】\[\]（）()＜＞<>／\/｜|・:：;；〜~—_]+/)
      .map(cleanEdge)
      .filter(Boolean);

    let prefix = '';
    for(const token of tokens){
      prefix += token;
      if(prefix) variants.add(prefix);
      if(charLength(token) >= 4) variants.add(token);
    }

    return [...variants]
      .filter(Boolean)
      .filter(isBalancedQuotes)
      .sort((a,b) => charLength(a) - charLength(b));
  }

  function scoreText(text, target=104){
    const len = charLength(text.replace(/！+$/g,''));
    let score = 0;
    if(len >= 100 && len <= 110) score += 1000;
    else if(len >= 90) score += 700;
    else if(len >= 75) score += 400;
    else score += len * 2;
    score -= Math.abs(target - len) * 4;
    return score;
  }

  function pickFive(candidates, seed){
    const unique = [...new Set(candidates)]
      .filter(Boolean)
      .filter(isBalancedQuotes)
      .filter(t => charLength(t.replace(/！+$/g,'')) <= LIMIT);

    if(!unique.length) return [];

    const rand = mulberry32(seed);
    const ranked = unique
      .map(text => ({text, score: scoreText(text) + rand() * 30}))
      .sort((a,b) => b.score - a.score);

    const chosen = [];
    for(const item of ranked){
      if(!chosen.includes(item.text)) chosen.push(item.text);
      if(chosen.length === 5) break;
    }
    return chosen.map(finalize);
  }

  function buildResults(titleRaw, commentRaw, seed){
    const commentUnits = buildCommentUnits(commentRaw);
    const commentCombos = buildOrderedCombos(commentUnits);
    const withoutTitle = pickFive(commentCombos, seed);

    const titleVariants = buildTitleVariants(titleRaw);
    const withTitleCandidates = [];

    for(const title of titleVariants){
      const prefix = addBang(title);
      if(charLength(prefix.replace(/！+$/g,'')) > LIMIT) continue;

      for(const comment of commentCombos){
        const joined = compact(prefix + comment);
        if(charLength(joined.replace(/！+$/g,'')) <= LIMIT && isBalancedQuotes(joined)){
          withTitleCandidates.push(joined);
        }
      }
    }

    return {
      withTitle: pickFive(withTitleCandidates, seed + 777),
      withoutTitle
    };
  }

  function render(container, items, startNo){
    container.innerHTML = '';
    if(!items.length){
      container.innerHTML = '<div class="empty">110文字以内で作れる候補がありません。作品名や商品コメントに自然な区切りが少ない場合があります。</div>';
      return;
    }

    items.forEach((text,i) => {
      const card = document.createElement('article');
      card.className = 'result-card';

      const head = document.createElement('div');
      head.className = 'result-head';

      const no = document.createElement('div');
      no.className = 'result-no';
      no.textContent = String(startNo + i);

      const count = document.createElement('div');
      count.className = 'count';
      count.textContent = `${bodyLength(text)}/${LIMIT}文字＋🩷🩷🩷`;

      const p = document.createElement('p');
      p.className = 'text';
      p.textContent = text;

      const btn = document.createElement('button');
      btn.className = 'copy';
      btn.type = 'button';
      btn.textContent = 'コピー';
      btn.addEventListener('click', async () => {
        try{
          await navigator.clipboard.writeText(text);
        }catch{
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
        }
        btn.textContent = 'コピーしました';
        btn.classList.add('done');
        setTimeout(() => {
          btn.textContent = 'コピー';
          btn.classList.remove('done');
        }, 1400);
      });

      head.append(no,count);
      card.append(head,p,btn);
      container.appendChild(card);
    });
  }

  function showStatus(message,type='ok'){
    statusEl.textContent = message;
    statusEl.className = `status show ${type}`;
  }

  function generate(isRegenerate=false){
    const title = titleEl.value.trim();
    const comment = commentEl.value.trim();

    if(!comment){
      showStatus('商品コメントを入力してください。','warn');
      return;
    }

    showStatus(isRegenerate ? '別の組み合わせで再生成しました。' : '生成しました。','ok');
    generationSeed = isRegenerate ? generationSeed + 1009 : Date.now();

    const result = buildResults(title,comment,generationSeed);
    render(withTitleEl,result.withTitle,1);
    render(withoutTitleEl,result.withoutTitle,6);
  }

  document.getElementById('generate').addEventListener('click',() => generate(false));
  document.getElementById('regenerate').addEventListener('click',() => generate(true));
})();
</script>
</body>
</html>
