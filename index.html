<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>作品コメント組み合わせツール v3</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#111827;
      --ok:#047857;
      --warn:#b45309;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
      line-height:1.6;
    }
    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:18px 14px 48px;
    }
    h1{
      margin:0 0 4px;
      font-size:22px;
      line-height:1.35;
    }
    .lead{
      margin:0 0 16px;
      color:var(--muted);
      font-size:13px;
    }
    .panel,.result-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 2px 10px rgba(0,0,0,.04);
    }
    .panel{padding:16px}
    label{
      display:block;
      font-weight:700;
      margin:0 0 6px;
      font-size:14px;
    }
    input,textarea{
      width:100%;
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:12px;
      font:inherit;
      font-size:16px;
      color:var(--text);
      background:#fff;
      outline:none;
    }
    input:focus,textarea:focus{
      border-color:#6b7280;
      box-shadow:0 0 0 3px rgba(107,114,128,.12);
    }
    textarea{
      min-height:180px;
      resize:vertical;
    }
    .field + .field{margin-top:14px}
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:16px;
    }
    button{
      appearance:none;
      border:0;
      border-radius:10px;
      padding:12px 14px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
    }
    .primary{background:var(--primary);color:#fff}
    .secondary{background:#e5e7eb;color:var(--text)}
    .rules{
      margin:14px 0 0;
      padding:12px;
      background:#f9fafb;
      border-radius:10px;
      font-size:12px;
      color:#4b5563;
    }
    .status{
      display:none;
      margin-top:12px;
      padding:10px 12px;
      border-radius:10px;
      font-size:13px;
    }
    .status.show{display:block}
    .status.warn{background:#fff7ed;color:var(--warn)}
    .status.ok{background:#ecfdf5;color:var(--ok)}
    .section-title{
      margin:24px 2px 10px;
      font-size:18px;
    }
    .results{
      display:grid;
      gap:10px;
    }
    .result-card{
      padding:14px;
    }
    .result-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }
    .result-no{
      font-weight:800;
      font-size:14px;
    }
    .count{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }
    .text{
      margin:0;
      font-size:15px;
      word-break:break-word;
    }
    .copy{
      width:100%;
      margin-top:12px;
      background:#eef2ff;
      color:#3730a3;
      padding:10px;
    }
    .copy.done{
      background:#ecfdf5;
      color:var(--ok);
    }
    .empty{
      padding:16px;
      background:#fff;
      border:1px dashed #cbd5e1;
      border-radius:12px;
      color:var(--muted);
      font-size:14px;
    }
    @media (max-width:420px){
      .actions{grid-template-columns:1fr}
      h1{font-size:20px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>作品コメント組み合わせツール v3</h1>
    <p class="lead">単語の途中では切らず、本文110文字以内＋最後に🩷🩷🩷を付けます。</p>

    <section class="panel">
      <div class="field">
        <label for="title">作品名</label>
        <input id="title" type="text" placeholder="作品名を貼り付け">
      </div>

      <div class="field">
        <label for="comment">商品コメント</label>
        <textarea id="comment" placeholder="商品コメントを貼り付け"></textarea>
      </div>

      <div class="actions">
        <button id="generate" class="primary" type="button">生成</button>
        <button id="regenerate" class="secondary" type="button">再生成</button>
      </div>

      <div class="rules">
        原文にない文章は追加しません。文字数だけで途中カットせず、文・区切り単位で組み合わせます。「、」は削除。「。」などは「！」に統一。改行なし。本文は110文字以内。最後の「！」は外し、その後ろに「🩷🩷🩷」を付けます。ハートは文字数に含めません。
      </div>
      <div id="status" class="status"></div>
    </section>

    <section>
      <h2 class="section-title">作品名あり（5案）</h2>
      <div id="withTitle" class="results">
        <div class="empty">作品名と商品コメントを入力して「生成」を押してください。</div>
      </div>
    </section>

    <section>
      <h2 class="section-title">商品コメントのみ（5案）</h2>
      <div id="withoutTitle" class="results">
        <div class="empty">生成結果がここに表示されます。</div>
      </div>
    </section>
  </main>

<script>
(() => {
  const LIMIT = 110;
  const HEARTS = '🩷🩷🩷';
  const titleEl = document.getElementById('title');
  const commentEl = document.getElementById('comment');
  const withTitleEl = document.getElementById('withTitle');
  const withoutTitleEl = document.getElementById('withoutTitle');
  const statusEl = document.getElementById('status');
  let generationSeed = Date.now();

  function normalizeText(text) {
    return String(text || '')
      .replace(/\r?\n/g, '')
      .replace(/[、，,]/g, '')
      .replace(/[。．.！？!?]+/g, '！')
      .replace(/！{2,}/g, '！')
      .replace(/[ \t\u3000]+/g, '')
      .trim();
  }

  function cleanEdge(text) {
    return normalizeText(text)
      .replace(/^[！・:：;；\-—_~〜]+/, '')
      .replace(/[！・:：;；\-—_~〜]+$/, '');
  }

  function addBang(text) {
    const s = cleanEdge(text);
    return s ? s + '！' : '';
  }

  function finalize(text) {
    const body = normalizeText(text).replace(/！+$/g, '');
    return body ? body + HEARTS : '';
  }

  function bodyLength(text) {
    const body = text.endsWith(HEARTS) ? text.slice(0, -HEARTS.length) : text;
    return Array.from(body).length;
  }

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }

  function shuffled(arr, seed) {
    const a = [...arr];
    const rand = mulberry32(seed);
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function splitSentences(raw) {
    const text = String(raw || '').replace(/\r?\n/g, '');
    const matches = text.match(/[^。．.!！?？]+[。．.!！?？]?/g) || [];
    const parts = matches
      .map(cleanEdge)
      .filter(Boolean);
    return parts.length ? parts : [cleanEdge(text)].filter(Boolean);
  }

  function splitLongPhrase(text) {
    const s = cleanEdge(text);
    if (!s) return [];

    // 文字数では切らず、記号などの自然な区切りだけを使う。
    const pieces = s
      .split(/[「」『』【】\[\]（）()＜＞<>／\/｜|・:：;；〜~\-—_]+/)
      .map(cleanEdge)
      .filter(Boolean);

    return pieces.length ? [...new Set(pieces)] : [s];
  }

  function buildCommentUnits(raw) {
    const sentences = splitSentences(raw);
    const units = [];
    sentences.forEach(sentence => {
      units.push(sentence);
      const sub = splitLongPhrase(sentence);
      if (sub.length > 1) units.push(...sub);
    });
    return [...new Set(units.map(cleanEdge).filter(Boolean))];
  }

  function buildOrderedCombos(units) {
    const combos = [];
    const n = Math.min(units.length, 24);

    // 連続範囲
    for (let start = 0; start < n; start++) {
      let current = '';
      for (let end = start; end < n; end++) {
        current += addBang(units[end]);
        if (current.length <= LIMIT) combos.push(current);
        else break;
      }
    }

    // 原文順を維持した間引き
    if (n <= 15) {
      const total = 1 << n;
      for (let mask = 1; mask < total; mask++) {
        let text = '';
        for (let i = 0; i < n; i++) {
          if (mask & (1 << i)) {
            const next = text + addBang(units[i]);
            if (next.length > LIMIT) break;
            text = next;
          }
        }
        if (text) combos.push(text);
      }
    } else {
      for (let step = 2; step <= 5; step++) {
        for (let offset = 0; offset < step; offset++) {
          let text = '';
          for (let i = offset; i < n; i += step) {
            const next = text + addBang(units[i]);
            if (next.length > LIMIT) break;
            text = next;
          }
          if (text) combos.push(text);
        }
      }
    }

    return [...new Set(combos.map(normalizeText).filter(Boolean))];
  }

  function buildTitleVariants(rawTitle) {
    const full = cleanEdge(rawTitle);
    if (!full) return [];

    const variants = new Set([full]);
    const chunks = full
      .split(/[「」『』【】\[\]（）()＜＞<>／\/｜|・:：;；〜~\-—_]+/)
      .map(cleanEdge)
      .filter(Boolean);

    // 自然な区切りがある場合だけ短縮。単語途中の文字数カットはしない。
    if (chunks.length > 1) {
      let joined = '';
      chunks.forEach(chunk => {
        joined += chunk;
        if (joined) variants.add(joined);
        if (chunk.length >= 4) variants.add(chunk);
      });
    }

    return [...variants]
      .filter(Boolean)
      .sort((a, b) => a.length - b.length);
  }

  function scoreText(text, target=104) {
    const len = text.length;
    // 100〜110文字を強く優先。短すぎるものは下げる。
    let score = 0;
    if (len >= 100 && len <= 110) score += 1000;
    else if (len >= 90) score += 700;
    else if (len >= 75) score += 400;
    else score += len * 2;
    score -= Math.abs(target - len) * 4;
    return score;
  }

  function pickFive(candidates, seed) {
    const unique = [...new Set(candidates)]
      .filter(t => t && t.length <= LIMIT);

    if (!unique.length) return [];

    const rand = mulberry32(seed);
    const ranked = unique
      .map(text => ({text, score: scoreText(text) + rand() * 25}))
      .sort((a, b) => b.score - a.score);

    const chosen = [];
    for (const item of ranked) {
      // 似すぎる候補を少し避ける
      const tooSimilar = chosen.some(c => {
        const min = Math.min(c.length, item.text.length);
        let same = 0;
        for (let i = 0; i < min; i++) {
          if (c[i] === item.text[i]) same++;
          else break;
        }
        return same / min > 0.9 && Math.abs(c.length - item.text.length) < 8;
      });
      if (!tooSimilar || chosen.length < 2) chosen.push(item.text);
      if (chosen.length === 5) break;
    }

    if (chosen.length < 5) {
      for (const item of ranked) {
        if (!chosen.includes(item.text)) chosen.push(item.text);
        if (chosen.length === 5) break;
      }
    }

    return chosen.sort((a, b) => a.length - b.length).map(finalize);
  }

  function buildResults(titleRaw, commentRaw, seed) {
    const commentUnits = buildCommentUnits(commentRaw);
    const commentCombos = buildOrderedCombos(commentUnits);
    const withoutTitle = pickFive(commentCombos, seed);

    const titleVariants = buildTitleVariants(titleRaw);
    const withTitleCandidates = [];

    titleVariants.forEach(title => {
      const prefix = addBang(title);
      if (prefix.length > LIMIT) return;

      commentCombos.forEach(comment => {
        const joined = normalizeText(prefix + comment);
        if (joined.length <= LIMIT) withTitleCandidates.push(joined);
      });

      // コメント側が長すぎる場合に、タイトルだけの候補も残す
      if (prefix.length >= 8 && prefix.length <= LIMIT) {
        withTitleCandidates.push(prefix);
      }
    });

    return {
      withTitle: pickFive(withTitleCandidates, seed + 777),
      withoutTitle
    };
  }

  function render(container, items, startNo) {
    container.innerHTML = '';
    if (!items.length) {
      container.innerHTML = '<div class="empty">110文字以内で作れる候補がありません。商品コメント内の区切りが少ない場合は、元のコメントをもう少し長めに貼り付けてください。</div>';
      return;
    }

    items.forEach((text, i) => {
      const card = document.createElement('article');
      card.className = 'result-card';

      const head = document.createElement('div');
      head.className = 'result-head';

      const no = document.createElement('div');
      no.className = 'result-no';
      no.textContent = `${startNo + i}`;

      const count = document.createElement('div');
      count.className = 'count';
      count.textContent = `${bodyLength(text)}/${LIMIT}文字＋🩷🩷🩷`;

      const p = document.createElement('p');
      p.className = 'text';
      p.textContent = text;

      const btn = document.createElement('button');
      btn.className = 'copy';
      btn.type = 'button';
      btn.textContent = 'コピー';
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
        }
        btn.textContent = 'コピーしました';
        btn.classList.add('done');
        setTimeout(() => {
          btn.textContent = 'コピー';
          btn.classList.remove('done');
        }, 1400);
      });

      head.append(no, count);
      card.append(head, p, btn);
      container.appendChild(card);
    });
  }

  function showStatus(message, type='ok') {
    statusEl.textContent = message;
    statusEl.className = `status show ${type}`;
  }

  function generate(isRegenerate=false) {
    const title = titleEl.value.trim();
    const comment = commentEl.value.trim();

    if (!comment) {
      showStatus('商品コメントを入力してください。', 'warn');
      return;
    }

    if (!title) {
      showStatus('作品名が空欄のため「作品名あり」は生成できません。商品コメントのみを生成します。', 'warn');
    } else {
      showStatus(isRegenerate ? '別の組み合わせで再生成しました。' : '生成しました。', 'ok');
    }

    generationSeed = isRegenerate ? generationSeed + 1009 : Date.now();
    const result = buildResults(title, comment, generationSeed);
    render(withTitleEl, result.withTitle, 1);
    render(withoutTitleEl, result.withoutTitle, 6);
  }

  document.getElementById('generate').addEventListener('click', () => generate(false));
  document.getElementById('regenerate').addEventListener('click', () => generate(true));
})();
</script>
</body>
</html>
